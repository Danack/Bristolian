default:
  autoload:
    '': "%paths.base%/features/bootstrap"
  suites:
    default:
      paths:
        - "%paths.base%/features"
      contexts:
#        - FeatureContext:
        - BristolianBehat\SiteContext
        - BristolianBehat\BristolianFailureContext
      filters:
        tags: "~@broken"
#    app:
#      remote_coverage_enabled: true
#      paths:
#        - "%paths.base%/test/features/app"
#      contexts:
#        - BristolianBehat\SiteContext
#      filters:
#        tags: "~@broken"
  extensions:
    DMore\ChromeExtension\Behat\ServiceContainer\ChromeExtension: ~
    FailAid\Extension:
      screenshot:
        directory: /var/app/tmp
        autoClean: false
        mode: png
        hostDirectory: "%paths.base%/tmp"
        size: 1444x1280
    Behat\MinkExtension:
      base_url: http://local.bristolian.org
      files_path: "%paths.base%/test/fixtures/"
      sessions:
        default:
          chrome:
            api_url: "http://chrome_headless:9222"
            socket_timeout: 60
            validate_certificate: false